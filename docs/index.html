<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SlotraCH GmbH</title>
  <meta name="description" content="Redirecting to the active travel module.">
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.png">
  <link rel="apple-touch-icon" href="./logo.png">
  <meta http-equiv="refresh" content="6;url=./china.html">
  <script src="./site-config.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2eb;
      color: #121212;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    p {
      margin: 0;
      padding: 0 20px;
      text-align: center;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <p>Redirecting to journeys...</p>
  <script>
    (function () {
      var rawConfig = window.SITE_CONFIG || {};
      var configuredMarket = (typeof rawConfig.market === "string" && rawConfig.market.toLowerCase() === "cn") ? "cn" : "eu";
      var forcedMarket = typeof rawConfig.forceMarket === "string" ? rawConfig.forceMarket.toLowerCase() : "";
      var autoDetect = rawConfig.autoDetectMarket !== false;
      var geoLookupTimeoutMs = Number(rawConfig.geoLookupTimeoutMs) || 1800;
      var geoApiUrls = Array.isArray(rawConfig.geoApiUrls) && rawConfig.geoApiUrls.length
        ? rawConfig.geoApiUrls
        : [
            "https://ipapi.co/json/",
            "https://ipwho.is/"
          ];

      function targetByMarket(market) {
        return market === "cn" ? "./switzerland.html" : "./china.html";
      }

      function persistVisitorDefaults(market) {
        var defaultLang = market === "cn" ? "zh" : "en";
        try {
          localStorage.setItem("site-market", market);
          localStorage.setItem("site-ip-default-lang", defaultLang);
          var langKey = "site-lang-" + market;
          if (!localStorage.getItem(langKey)) {
            localStorage.setItem(langKey, defaultLang);
          }
        } catch (e) {}
      }

      function redirectToMarket(market) {
        persistVisitorDefaults(market);
        window.location.replace(targetByMarket(market));
      }

      function getCountryCode(payload) {
        if (!payload || typeof payload !== "object") return "";
        var code = payload.country_code || payload.countryCode || payload.country || payload.countryCodeIso2 || "";
        return String(code).trim().toUpperCase();
      }

      function fetchCountryCode(url) {
        return new Promise(function (resolve) {
          var timer = window.setTimeout(function () {
            resolve("");
          }, geoLookupTimeoutMs);

          fetch(url, { credentials: "omit", cache: "no-store" })
            .then(function (response) {
              if (!response.ok) throw new Error("HTTP " + response.status);
              return response.json();
            })
            .then(function (data) {
              window.clearTimeout(timer);
              resolve(getCountryCode(data));
            })
            .catch(function () {
              window.clearTimeout(timer);
              resolve("");
            });
        });
      }

      async function detectMarketByIp() {
        for (var i = 0; i < geoApiUrls.length; i += 1) {
          var code = await fetchCountryCode(geoApiUrls[i]);
          if (code) return code === "CN" ? "cn" : "eu";
        }
        return configuredMarket;
      }

      if (forcedMarket === "cn" || forcedMarket === "eu") {
        redirectToMarket(forcedMarket);
        return;
      }

      if (!autoDetect) {
        redirectToMarket(configuredMarket);
        return;
      }

      detectMarketByIp()
        .then(redirectToMarket)
        .catch(function () { redirectToMarket(configuredMarket); });
    })();
  </script>
</body>
</html>
